<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>T-TESS Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@500;600;700&family=Public+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#F2F4F3; --ink:#1C2B33; --card:#FFFFFF; --border:#D9DEDC; --line:#EDF0EF;
    --muted:#71807B; --faint:#8A9793; --sub:#44565F;
    --d1:#2C4B7C; --d2:#8E4A7E; --d3:#2E8B8B; --d4:#C96A2E;
    --amber:#E3A93C; --amberT:#7A5410; --blue:#5B8DBE; --blueT:#28517A;
    --green:#3E7C4F; --greenT:#1F5230; --gray:#C6CCC9; --red:#B4534A;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--paper);color:var(--ink);font-family:'Public Sans',system-ui,sans-serif;font-size:14px;line-height:1.5}
  .mono{font-family:'IBM Plex Mono',monospace}
  .disp{font-family:'Bitter',serif}
  button{cursor:pointer;font-family:inherit;font-size:13px}
  button:focus-visible,input:focus-visible,textarea:focus-visible,select:focus-visible{outline:2px solid var(--d1);outline-offset:2px}
  input,textarea,select{font-family:'Public Sans',system-ui,sans-serif;font-size:13px;border:1px solid var(--border);border-radius:6px;padding:8px 10px;color:var(--ink);background:#fff}
  ::placeholder{color:var(--faint)}
  header.top{background:var(--ink);color:var(--paper);padding:14px 20px}
  .wrap{max-width:1060px;margin:0 auto}
  .top .wrap{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
  .eyebrow{font-size:10px;letter-spacing:.18em;color:#9DB4C4;text-transform:uppercase;font-family:'IBM Plex Mono',monospace}
  .brand{font-family:'Bitter',serif;font-size:22px;font-weight:700;line-height:1.2}
  .brand .sq{display:inline-block;width:9px;height:9px;border-radius:2px;margin-left:3px;transform:translateY(-2px)}
  .namechip{font-family:'IBM Plex Mono',monospace;font-size:12px;color:#C3CFCB;border:1px solid #44565F;border-radius:20px;padding:7px 14px}
  nav.tabs{background:#fff;border-bottom:1px solid var(--border)}
  nav.tabs .wrap{display:flex;gap:2px;padding:0 20px;overflow-x:auto}
  nav.tabs button{padding:12px 16px;border:none;background:transparent;font-size:14px;font-weight:600;color:var(--muted);border-bottom:3px solid transparent;white-space:nowrap}
  nav.tabs button.on{color:var(--ink);border-bottom-color:var(--ink)}
  main{max-width:1060px;margin:0 auto;padding:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:8px}
  .chip{padding:5px 11px;border-radius:14px;border:1px solid var(--gray);background:#fff;color:#5A6662;font-size:12px;font-weight:600}
  .chip.on{border-width:1.5px}
  .btn{border:1px solid var(--gray);background:#fff;border-radius:6px;padding:7px 12px;font-weight:600;color:var(--sub)}
  .btn.dark{background:var(--ink);color:var(--paper);border:none}
  .btn:disabled{opacity:.55;cursor:default}
  .datechip{background:#fff;border:1px solid var(--border);border-radius:8px;padding:7px 12px;font-size:12px}
  .datechip.urgent{background:#FBEFDD;border-color:var(--amber)}
  .domcard{text-align:left;background:#fff;border:1px solid var(--border);border-radius:8px;padding:12px 14px;width:100%}
  .domgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-bottom:16px}
  .minibar{display:flex;height:8px;border-radius:4px;overflow:hidden;background:#E7EBE9}
  .pill{font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;padding:4px 9px;border-radius:12px;border:none;min-width:92px;flex-shrink:0}
  .critrow{display:flex;align-items:flex-start;gap:10px;padding:10px 14px}
  .crittext{flex:1;text-align:left;border:none;background:transparent;padding:0;font-size:14px;line-height:1.45;color:var(--ink)}
  .ideabox{background:#F5F7F6;border-radius:6px;padding:10px 12px;color:var(--sub);margin-bottom:10px;line-height:1.5;font-size:13px}
  .usebtn{font-family:'IBM Plex Mono',monospace;flex-shrink:0;font-size:10px;font-weight:600;border:1px solid var(--gray);background:#fff;border-radius:10px;padding:2px 8px;color:var(--d1);min-width:58px}
  .usebtn.added{border-color:var(--green);background:var(--green);color:#fff}
  .fieldgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .fieldgrid input{width:100%}
  .dimtag{font-family:'IBM Plex Mono',monospace;color:#fff;font-size:12px;font-weight:600;padding:3px 8px;border-radius:4px}
  .msg{max-width:82%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.55;white-space:pre-wrap;overflow-wrap:break-word}
  .msg.user{background:var(--ink);color:var(--paper);border-top-right-radius:3px}
  .msg.bot{background:#F5F7F6;color:var(--ink);border-top-left-radius:3px}
  .modechip{padding:8px 13px;border-radius:18px;border:1px solid var(--gray);background:#fff;color:var(--sub);font-size:13px;font-weight:600}
  .modechip.on{border:2px solid var(--ink);background:var(--ink);color:var(--paper)}
  label.lab{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:var(--muted);display:block}
  .note{font-size:11px;color:var(--faint);line-height:1.6}
  details.saved{border-top:1px solid var(--line);padding:10px 0}
  details.saved summary{cursor:pointer;font-size:13px;font-weight:600;display:flex;gap:10px;align-items:center;list-style:none}
  details.saved summary::-webkit-details-marker{display:none}
  @media (max-width:640px){.fieldgrid{grid-template-columns:1fr}}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  .overlay{position:fixed;inset:0;background:rgba(28,43,51,.55);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
  .overlay .box{background:#fff;border-radius:12px;max-width:520px;width:100%;padding:24px;max-height:90vh;overflow-y:auto}
  .nudge{background:#FBEFDD;border:1px solid var(--amber);border-radius:8px;padding:8px 12px;font-size:12px;color:var(--amberT);display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
</style>
</head>
<body>
<header class="top"><div class="wrap">
  <div>
    <div class="eyebrow">Texas Teacher Evaluation &amp; Support System</div>
    <div class="brand">T-TESS Companion
      <span class="sq" style="background:var(--d1)"></span><span class="sq" style="background:var(--d2)"></span><span class="sq" style="background:var(--d3)"></span><span class="sq" style="background:var(--d4)"></span>
    </div>
  </div>
  <div class="namechip" id="namechip">My workspace</div>
</div></header>
<nav class="tabs"><div class="wrap">
  <button data-tab="dashboard" class="on">Evidence Dashboard</button>
  <button data-tab="coach">Coach</button>
  <button data-tab="settings">Settings, Goals &amp; Notes</button>
</div></nav>
<main id="main"></main>

<script>

const CRITERIA = [{"id":"c1","dim":"1.1","dn":"Standards and Alignment","c":"All rigorous and measurable goals are aligned to state content standards.","i":["Lesson plan with the TEKS code written next to each objective, stated in measurable language (e.g., 'Students will... with 80% accuracy').","Course syllabus or unit overview listing the standards covered in each unit.","Screenshot of an LMS assignment tagged with its standard, next to the measurable objective.","Photo of your daily objective board showing a measurable, standards-coded objective.","District curriculum map annotated with your lesson objectives."],"p":"One-Time OK","dom":1},{"id":"c2","dim":"1.1","dn":"Standards and Alignment","c":"Activities, materials and assessments are logically sequenced.","i":["Unit plan or pacing guide showing activities in a clear I-do/We-do/You-do or scaffolded order.","Pacing calendar showing lessons building in a deliberate order across the unit.","Slide deck agenda showing warm-up \u2192 instruction \u2192 practice \u2192 closure progression.","LMS module screenshot showing lessons locked/ordered in sequence."],"p":"One-Time OK","dom":1},{"id":"c3","dim":"1.1","dn":"Standards and Alignment","c":"Activities, materials and assessments are relevant to students' prior understanding and real-world applications.","i":["A lesson opener/hook document or slide that ties new content to a real-world scenario or prior unit.","Warm-up or bell-ringer slide that explicitly bridges from the previous lesson.","KWL or anticipation-guide artifact activating prior knowledge.","Lesson hook referencing a current event or everyday scenario students recognize."],"p":"One-Time OK","dom":1},{"id":"c4","dim":"1.1","dn":"Standards and Alignment","c":"Activities, materials and assessments integrate and reinforce concepts from other disciplines.","i":["A cross-curricular lesson plan (e.g., a science lab that reinforces a math skill, or a history reading tied to ELA writing standards).","Co-planned lesson or email thread with a teacher from another department.","Assignment rubric that grades a skill from another discipline (e.g., writing or graphing).","Project brief that requires content from two subject areas."],"p":"One-Time OK","dom":1},{"id":"c5","dim":"1.1","dn":"Standards and Alignment","c":"Activities, materials and assessments provide appropriate time for student work, student reflection, lesson and lesson closure.","i":["Lesson plan with a written timing breakdown showing minutes allotted to work time, reflection, and closure (e.g., an exit ticket).","Annotated agenda with minutes allotted to each segment, including closure.","Photo of an on-screen timer used to protect work and reflection time.","Sample reflection prompt or exit ticket that closes the lesson."],"p":"One-Time OK","dom":1},{"id":"c6","dim":"1.1","dn":"Standards and Alignment","c":"Activities, materials and assessments deepen understanding of broader unit and course objectives.","i":["Unit map showing how this lesson's objective ladders up to the unit goal and course-level standard.","Essential-questions poster or slide connecting today's lesson to the unit arc.","Culminating task description showing what daily lessons build toward.","Syllabus or course roadmap showing where this unit sits in the year."],"p":"One-Time OK","dom":1},{"id":"c7","dim":"1.1","dn":"Standards and Alignment","c":"Activities, materials and assessments are vertically aligned to state standards.","i":["A vertical alignment document or note showing how this skill connects to what students learned the prior grade level and what's coming next.","Vertical alignment chart showing the skill in the prior and next grade/course.","Notes from a vertical team or department alignment meeting.","Prerequisite-skills pretest that references prior-year standards."],"p":"One-Time OK","dom":1},{"id":"c8","dim":"1.1","dn":"Standards and Alignment","c":"Activities, materials and assessments are appropriate for diverse learners.","i":["Lesson plan with a visible differentiation/accommodations column (e.g., modified text, sentence stems, extension tasks).","Accommodations checklist showing how plans were implemented (names redacted).","Sentence stems, glossaries, or visual supports prepared for language learners.","Station or rotation plan giving multiple entry points to the same objective."],"p":"Ongoing","dom":1},{"id":"c9","dim":"1.1","dn":"Standards and Alignment","c":"Objectives are aligned and logically sequenced to the lesson's goal, providing relevant and enriching extensions of the lesson.","i":["An 'extension/enrichment task' attached to the lesson plan for students who finish early or need a challenge.","Early-finisher menu or extension column on the assignment.","Challenge task rubric attached to the core assignment.","Choice-board row labeled as enrichment beyond the objective."],"p":"One-Time OK","dom":1},{"id":"c10","dim":"1.1","dn":"Standards and Alignment","c":"Technology is integrated to enhance mastery of goal(s).","i":["Screenshot or link to a tech tool used purposefully in the lesson (e.g., Desmos, Nearpod, a simulation) with a note on how it deepened mastery.","Student digital product (slide, simulation result, video) tied to the objective.","LMS or app analytics screenshot showing mastery data from the tool.","Short written note on why the tool deepened mastery vs. paper alternative."],"p":"One-Time OK","dom":1},{"id":"c11","dim":"1.2","dn":"Data and Assessment","c":"Formal and informal assessments are used to monitor progress of all students.","i":["A combined gradebook export showing both a formal test score and an informal exit-ticket score for the same skill.","Photo of a stack/sample of exit tickets with a note on how results were used.","Observation checklist or clipboard notes covering every student.","Data tracker combining a formal score and an informal check for the same skill."],"p":"Ongoing","dom":1},{"id":"c12","dim":"1.2","dn":"Data and Assessment","c":"Appropriate diagnostic, formative and summative assessment data is shared with students to engage them in self-assessment.","i":["A student self-assessment/data-tracking sheet (e.g., a 'My Progress' chart students fill in after each quiz).","Test-corrections or reflection sheet where students respond to their own data.","Student data folder sample (redacted) showing scores shared with the student.","Notes from brief student data conferences."],"p":"Ongoing","dom":1},{"id":"c13","dim":"1.2","dn":"Data and Assessment","c":"Students build awareness of their own strengths and weaknesses and track their own progress.","i":["Student goal-tracking log or data notebook where students record scores and reflect on growth over time.","Student data notebook page graphing their own scores over time.","Digital tracker screenshot owned and updated by the student.","Student reflection log: 'my strength / my weakness / my next step.'"],"p":"Ongoing","dom":1},{"id":"c14","dim":"1.2","dn":"Data and Assessment","c":"Substantive, specific and timely feedback is given to students, families and school personnel on student growth in relation to classroom and campus goals.","i":["Copy of a parent progress email/newsletter or graded paper with specific written feedback (not just a grade).","Copy of a positive or growth-focused parent email (redacted).","Progress-report comments showing specific, actionable feedback.","Email looping in a counselor or case manager on student growth (redacted)."],"p":"Ongoing","dom":1},{"id":"c15","dim":"1.2","dn":"Data and Assessment","c":"Engages with colleagues to adapt school-wide instructional strategies and goals to meet student needs while maintaining confidentiality.","i":["PLC/team meeting notes showing you brought student data to the group and proposed an instructional adjustment.","PLC minutes showing you brought data and proposed an adjustment.","Shared intervention plan your team adopted after your data protocol.","Department agenda item you led on a school-wide strategy."],"p":"Ongoing","dom":1},{"id":"c16","dim":"1.2","dn":"Data and Assessment","c":"Analyzes student data connected to specific instructional strategies and uses results to reflect on his/her teaching.","i":["A short data-reflection memo: 'After reviewing quiz data, I re-taught X using strategy Y' with before/after scores.","Item analysis of an assessment with your written next steps.","Reteach plan with before/after scores attached.","Short teaching-reflection journal entry tied to a specific data point."],"p":"Ongoing","dom":1},{"id":"c17","dim":"1.2","dn":"Data and Assessment","c":"Monitors teaching strategies and behaviors in relation to student success based on data analysis.","i":["A running log entry noting a strategy change tied to a specific data point (e.g., re-grouping after formative check).","Running log of strategy changes, each tied to the data that prompted it.","Comparison of two class periods where you varied the strategy and tracked results.","Note documenting a regrouping decision after a formative check."],"p":"Ongoing","dom":1},{"id":"c18","dim":"1.3","dn":"Knowledge of Students","c":"All lessons connect to students' prior knowledge, experiences, interests and future learning expectations across content areas.","i":["Lesson plan opener that explicitly references a prior lesson, a student interest survey result, or an upcoming topic.","Student interest survey plus the lesson element it shaped.","Opener slide explicitly referencing a prior unit or another course.","Career or future-course connection slide in the lesson."],"p":"Ongoing","dom":1},{"id":"c19","dim":"1.3","dn":"Knowledge of Students","c":"Provides guidance for students to apply their strengths, background knowledge, life experiences and skills to enhance each other's learning.","i":["A peer-teaching or jigsaw activity plan where students with different backgrounds/strengths are intentionally grouped.","Jigsaw plan where each student teaches a piece to the group.","Peer-tutoring roster pairing complementary strengths.","Gallery-walk feedback forms where students improve each other's work."],"p":"One-Time OK","dom":1},{"id":"c20","dim":"1.3","dn":"Knowledge of Students","c":"Provides opportunities for students to utilize their individual learning patterns, habits and needs to achieve high levels of academic and social-emotional success.","i":["A choice board or learning-menu assignment letting students pick a format (visual, written, hands-on) that fits their learning style.","Choice board letting students pick the format that fits how they learn.","Learning-preference survey plus the options you built from it.","Menu assignment with visual, written, and hands-on paths to one objective."],"p":"One-Time OK","dom":1},{"id":"c21","dim":"1.4","dn":"Activities","c":"Provides opportunities for students to generate questions that lead to further inquiry and promote complex, higher-order thinking, problem solving and real-world application.","i":["A student-generated 'wonder wall' or inquiry-question log from a lesson, plus the follow-up investigation it led to.","Photo of a wonder wall or driving-question board with student questions.","Question Formulation Technique (QFT) artifacts from a lesson.","Student question log plus the follow-up investigation it launched."],"p":"One-Time OK","dom":1},{"id":"c22","dim":"1.4","dn":"Activities","c":"Forms instructional groups based on the needs of all students and allows students to take ownership of group and individual accountability.","i":["A grouping roster showing how groups were formed (by data/need) plus a group role-assignment sheet (facilitator, recorder, etc.).","Grouping roster annotated with the data used to form groups.","Role cards (facilitator, recorder, materials, reporter) used in groups.","Group contract or accountability checklist students signed."],"p":"Ongoing","dom":1},{"id":"c23","dim":"1.4","dn":"Activities","c":"Enables all students to set goals, reflect on, evaluate and hold each other accountable within instructional groups.","i":["A group work rubric or peer-accountability checklist students fill out about their own group's process.","Group goal sheet set by the group at the start of a task.","Peer-evaluation rubric students complete about their group.","Group reflection exit slip: what we did well, what we fix next time."],"p":"Ongoing","dom":1},{"id":"c24","dim":"1.4","dn":"Activities","c":"Activities, resources, technology and instructional materials are all aligned to instructional purposes.","i":["Lesson plan materials list with a one-line justification for why each resource was chosen.","Materials list with a one-line purpose note for each resource.","Slide deck annotated with why each resource appears where it does.","Lesson plan showing every activity mapped to the objective."],"p":"One-Time OK","dom":1},{"id":"c25","dim":"1.4","dn":"Activities","c":"Activities, resources, technology and instructional materials are varied and appropriate to ability levels of students.","i":["A tiered assignment (same objective, 2-3 versions at different complexity levels).","Tiered assignment: same objective at 2-3 complexity levels.","Leveled text or problem sets for the same lesson.","Paired scaffolded and challenge versions of one task."],"p":"One-Time OK","dom":1},{"id":"c26","dim":"1.4","dn":"Activities","c":"Activities, resources, technology and instructional materials actively engage students in ownership of their learning.","i":["A student-led project, choice assignment, or portfolio piece showing student-directed decisions.","Student-led project artifact with student-made decisions visible.","Portfolio piece with the student's own selection rationale.","Samples of different products students chose for one objective."],"p":"One-Time OK","dom":1},{"id":"c27","dim":"2.1","dn":"Achieving Expectations","c":"Provides opportunities for students to establish high academic and social-emotional expectations for themselves.","i":["A student-written personal goal-setting sheet (academic + SEL goal) at the start of a unit or grading period.","Student-written goal sheet with an academic and an SEL goal.","Co-authored class mission or expectations statement.","Student learning contract for a unit or grading period."],"p":"One-Time OK","dom":2},{"id":"c28","dim":"2.1","dn":"Achieving Expectations","c":"Persists with the lesson until there is evidence that ALL students demonstrate mastery of the objective.","i":["Mastery-check data (exit ticket or quick quiz) showing 100% of students hit the objective, plus a note on the reteach loop used to get there.","Documentation of a reteach loop: data \u2192 regroup \u2192 recheck.","Mastery tracker showing retakes until every student reached the bar.","Small-group intervention log tied to the day's objective."],"p":"Ongoing","dom":2},{"id":"c29","dim":"2.1","dn":"Achieving Expectations","c":"Provides opportunities for students to self-monitor and self-correct mistakes.","i":["An answer-key self-check activity or error-analysis worksheet where students find and fix their own mistakes.","Error-analysis worksheet where students find and fix their own mistakes.","Self-check station or answer-key routine photo/description.","Rubric self-scoring students complete before submitting work."],"p":"One-Time OK","dom":2},{"id":"c30","dim":"2.1","dn":"Achieving Expectations","c":"Systematically enables students to set goals for themselves and monitor their progress over time.","i":["A recurring student goal-tracking sheet updated weekly/biweekly (not a one-time activity).","Weekly or biweekly goal tracker updated by students all term.","Log of recurring goal conferences across a grading period.","Screenshot of a student progress dashboard spanning multiple months."],"p":"Ongoing","dom":2},{"id":"c31","dim":"2.2","dn":"Content Knowledge and Expertise","c":"Displays extensive content knowledge of all the subjects taught and closely related subjects.","i":["A lesson plan or observation note where you connect the topic to a related discipline (e.g., chemistry tying into biology).","Advanced coursework, certification, or content PD certificate.","Lesson notes connecting the topic to a neighboring discipline.","Observer note citing depth or fluency of your content explanations."],"p":"Ongoing","dom":2},{"id":"c32","dim":"2.2","dn":"Content Knowledge and Expertise","c":"Integrates learning objectives with other disciplines, content areas and real-world experience.","i":["Cross-curricular project plan or guest-speaker/real-world case study used in a lesson.","Case study or real-world scenario used as the spine of a lesson.","Guest speaker or virtual field trip documentation tied to the objective.","Project brief framed around an authentic industry or community problem."],"p":"One-Time OK","dom":2},{"id":"c33","dim":"2.2","dn":"Content Knowledge and Expertise","c":"Consistently anticipates possible student misunderstandings and proactively develops teaching techniques to mitigate concerns.","i":["Lesson plan with an 'anticipated misconceptions' section and the specific teaching move planned to address each one.","Lesson plan with an anticipated-misconceptions column and planned moves.","Pre-test distractor analysis showing which wrong answers you planned for.","Anticipation guide built around common errors."],"p":"Ongoing","dom":2},{"id":"c34","dim":"2.2","dn":"Content Knowledge and Expertise","c":"Consistently provides opportunities for students to use different types of thinking (analytical, practical, creative, research-based).","i":["An assignment or rubric that explicitly requires more than one type of thinking (e.g., a project with an analysis section AND a creative design section).","One task requiring two thinking types (e.g., analyze data AND design a solution).","Task set labeled by DOK or Bloom's level.","Mini research task alongside a practical application task."],"p":"Ongoing","dom":2},{"id":"c35","dim":"2.2","dn":"Content Knowledge an s and collaboratively fosters faculty knowledge and skills.","i":["An article, training, or resource you shared with colleagues, plus a note on how it was used (e.g., a one-pager you wrote for your team).","One-pager or resource you created and shared with your team.","Screenshot of a shared folder/library you maintain for colleagues.","Email sharing a strategy plus colleague replies showing use (redacted)."],"p":"Ongoing","dom":4},{"id":"c63","dim":"4.3","dn":"Professional Development","c":"Develops and fulfills the school and district improvement plans through professional learning communities, grade- or subject-level team leadership, committee leadership or other opportunities beyond the campus.","i":["Sign-in sheet or appointment letter showing a leadership role (committee chair, grade-level lead, district task force) plus a brief summary of your contribution.","Appointment letter or roster showing a leadership role.","Committee minutes reflecting your contributions.","Agendas from team meetings you lead."],"p":"Ongoing","dom":4},{"id":"c64","dim":"4.4","dn":"School Community Involvement","c":"Systematically contacts parents/guardians regarding students' academic and social/emotional growth through various methods.","i":["A parent-contact log (calls, emails, ClassDojo/Remind messages) showing regular, varied-method outreach \u2014 not just at report card time.","Parent-contact log showing regular, varied outreach.","Messaging app (Remind/ClassDojo) export of ongoing family contact.","Archive of class newsletters sent across the year.","Positive-call log, not just concern calls."],"p":"Ongoing","dom":4},{"id":"c65","dim":"4.4","dn":"School Community Involvement","c":"Initiates collaborative efforts that enhance student learning and growth.","i":["Documentation of an event or partnership you started (e.g., a family math night, a tutoring program, a class-to-class collaboration).","Flyer or plan for an event you started (family night, tutoring, showcase).","Email chain showing a partnership you initiated (redacted).","Documentation of a club, program, or collaboration you founded."],"p":"One-Time OK","dom":4},{"id":"c66","dim":"4.4","dn":"School Community Involvement","c":"Leads students, colleagues, families and community members toward reaching the mission, vision and goals of the school.","i":["Newsletter, flyer, or presentation you created/led that explicitly ties back to the school's mission/vision/goals.","Newsletter or presentation you made that ties work to the school mission.","Campus event you led with mission/vision language in materials.","Project documentation explicitly aligned to campus improvement goals."],"p":"Ongoing","dom":4}];

const RUBRIC_NOTES = `T-TESS CORE KNOWLEDGE (Texas Teacher Evaluation & Support System, TEA rubric 4/2024)

PERFORMANCE LEVELS (student-centered <- -> teacher-centered): Distinguished, Accomplished, Proficient, Developing, Improvement Needed. Appraisers ANCHOR ratings at Proficient until evidence pulls them elsewhere. Proficient = strong practice; Distinguished = lofty, few consistently attain.

QUALIFIER LADDERS that separate levels (the "word bank"): all -> most -> some -> few; consistently -> regularly -> sometimes -> rarely; always -> regularly -> does -> sometimes -> does not. Moving up a level is often a matter of scope (all vs most students), agency (students do it vs teacher does it), and consistency.

KEY LEVEL DELTAS BY DIMENSION (Proficient -> Accomplished -> Distinguished essence):
1.1 Standards & Alignment: goals aligned -> measurable + vertical alignment + integrates disciplines -> rigorous AND measurable, real-world relevance, student reflection time, enriching extensions.
1.2 Data & Assessment: monitors all students, feedback, data tied to strategies -> + diagnostic/formative/summative in lesson plans, feedback on growth vs goals, use of results to reflect -> + students SELF-assess, track own progress; teacher engages colleagues to adapt school-wide strategies.
1.3 Knowledge of Students: connects to prior knowledge, adjusts for all -> + future learning expectations, students apply strengths for own learning -> + interests + cross-content, students enhance EACH OTHER'S learning, individual learning patterns for academic + SEL success.
1.4 Activities: higher-order questions, groups by need, roles understood, aligned materials -> + problem solving, group AND individual accountability, student input on goals -> + STUDENT-GENERATED questions driving inquiry, students own accountability, set goals and hold each other accountable, materials engage ownership.
2.1 Achieving Expectations: challenges all, persists till most master, addresses mistakes -> + students set own high expectations, anticipates mistakes, self-monitoring systems -> + persists till ALL master, students self-monitor and self-correct, systematic goal-setting over time.
2.2 Content Knowledge: accurate in multiple contexts, integrates disciplines, anticipates misunderstandings, types of thinking, fits discipline structure -> + depth for differentiated explanations, real-world, proactive mitigation, regularly -> + extensive knowledge of subject and related subjects, consistently, sequencing shows discipline + standards + related content + real-world.
2.3 Communication: most students communicate, recognizes misunderstandings with array of techniques, remember/understand/apply questions, probing questions -> + ALL students incl. visual tools/tech, anticipates misunderstandings proactively, creative/evaluative/analysis questions, wait time -> + variety of tools with teacher AND peers, uses misconceptions strategically to inspire discovery, balances wait time + student responses for STUDENT-DIRECTED learning, provokes student-led discussion.
2.4 Differentiation: adapts for individual needs of all, monitors participation, differentiated methods, recognizes confusion and responds -> + regularly differentiates, PROACTIVELY minimizes confusion -> + wide variety of strategies, consistently monitors, ALWAYS differentiates, PREVENTS confusion/disengagement.
2.5 Monitor & Adjust: invites input, adjusts for engagement, monitors behavior/responses -> + utilizes input incl. pacing, continual purposeful checks -> + SYSTEMATICALLY gathers input, discreet AND explicit checks through questioning + academic feedback.
3.1 Environment/Routines: procedures clear + efficient, students participate with limited direction, safe organized accessible to most -> + teacher implements effortlessly, students take SOME responsibility, inviting, accessible to ALL -> + routines rely primarily on STUDENT leadership, students take PRIMARY responsibility for groups/supplies/equipment, room designed to engage/challenge/inspire beyond objectives.
3.2 Managing Behavior: implements system proficiently, most students meet standards -> + monitors subtly, responds swiftly, most know/understand/respect -> + intercepts misbehavior FLUIDLY, students AND teacher CREATE/adopt/maintain the standards.
3.3 Classroom Culture: all engaged in relevant meaningful learning, respectful work -> + sometimes adjusts to interests, students collaborate positively with each other and teacher -> + consistently engages ALL based on interests/abilities, positive rapport AMONG students, students encourage each other's efforts and achievements.
4.1 Demeanor & Ethics: Code of Ethics, meets all standards, advocates for students in classroom -> + MODELS standards within classroom, advocates for ALL students -> + models across CAMPUS AND DISTRICT, advocates classroom AND campus.
4.2 Goal Setting: short+long-term goals from self-assessment/reflection/supervisor feedback, meets all -> + peer feedback + contemporary research + student learning analysis -> + consistently sets/MODIFIES/meets, substantial changes in practice -> significant improvement in student performance.
4.3 Professional Development: collaborates in ALL scheduled PD/PLC/committees -> + LEADS colleagues on campus, fosters faculty knowledge beyond campus -> + leads in AND BEYOND school, detailed data analysis, develops/fulfills school AND district improvement plans.
4.4 Community Involvement: contacts parents regularly (academic + social/emotional), all outreach, communicates mission -> + systematic contact through various methods, joins collaborative efforts, communicates to community members -> + INITIATES collaborative efforts, LEADS students/colleagues/families/community toward mission.

PROCESS RULES (Implementation Guidebook):
- Annual cycle: orientation (first 3 weeks, at least 2 weeks before first observation) -> GSPD plan submitted within 6 weeks of orientation -> informal walkthroughs + at least one formal observation -> post-conference (required, in person, ideally 20-30 min, evidence-driven, teacher self-identifying refinement area is the goal) -> EOY conference at least 15 days before last day of instruction.
- Pre-conference: not required but highly recommended; orient appraiser to lesson, students, routines; anticipate easy/moderate/difficult student responses.
- Domain 4 is NOT scored until AFTER the teacher presents evidence at the EOY conference. Artifacts are ESSENTIAL for Domains 1 and 4.
- Post-conference structure: Introduction -> Reinforcement (area of strength) -> Refinement (area to grow) -> Review ratings.
- Summative = rubric (80%) + student growth (20%). Evidence should drive ratings, not justify perceptions.
- Best practice: tie at least one GSPD goal to last year's refinement area.`;

  const out = {};
  [1,2,3,4].forEach(d=>{
    const crits = CRITERIA.filter(c=>c.dom===d);
    const counts = [0,0,0,0];
    crits.forEach(c=>counts[(S.evidence[c.id]?.s)||0]++);
    out[d] = {total:crits.length, counts};
  });
  return out;
}
function gapDims(){
  const byDim = {};
  CRITERIA.forEach(c=>{
    byDim[c.dim] = byDim[c.dim] || {name:c.dn, any:false};
    if(((S.evidence[c.id]?.s)||0)>0) byDim[c.dim].any = true;
  });
  return Object.entries(byDim).filter(([,v])=>!v.any).map(([k,v])=>`${k} ${v.name}`);
}
function keyDates(){
  const gspd = addDays(S.profile.orientation, 42);
  return [
    S.profile.orientation && {label:"Orientation", iso:S.profile.orientation},
    gspd && {label:"GSPD plan due (6 wks after orientation)", iso:gspd},
    S.profile.obsWindow && {label:"Observation window opens", iso:S.profile.obsWindow},
    S.profile.eoy && {label:"End-of-year conference", iso:S.profile.eoy},
  ].filter(Boolean);
}

function downloadBlob(content, filename, type){
  const blob = content instanceof Blob ? content : new Blob([content], {type});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename; document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 3000);
}

/* ---------------- provider adapters ---------------- */
async function callAI(systemText, history, maxTokens=1024){
  const provider = S.ai.provider, key = S.ai.key.trim(), model = modelName();
  if(!key) throw new Error("No API key set. Add one on the Settings tab.");
  // Only the latest user message carries attachments; older ones become text notes.
  const latestIdx = history.length - 1;
  const norm = history.map((m,i)=>({
    role: m.role,
    text: m.text || "(see attached)",
    files: (i===latestIdx && m.role==="user") ? (m.files||[]) : [],
    fileNote: (i!==latestIdx && m.files && m.files.length) ? ` [previously attached: ${m.files.map(f=>f.name).join(", ")}]` : "",
  }));

  if(provider === "gemini"){
    const contents = norm.map(m=>({
      role: m.role==="assistant" ? "model" : "user",
      parts: [
        ...m.files.map(f=>({inline_data:{mime_type:f.mime, data:f.data}})),
        {text: m.text + m.fileNote},
      ],
    }));
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(key)}`, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({system_instruction:{parts:[{text:systemText}]}, contents, generationConfig:{maxOutputTokens:maxTokens}}),
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data?.error?.message || `Gemini error ${res.status}`);
    const parts = data?.candidates?.[0]?.content?.parts || [];
    const text = parts.map(p=>p.text||"").join("").trim();
    if(!text) throw new Error("Gemini returned an empty response. Try again or check the model name in Settings.");
    return text;
  }

  if(provider === "anthropic"){
    const messages = norm.map(m=>{
      if(m.role==="assistant") return {role:"assistant", content:m.text};
      if(m.files.length){
        const blocks = m.files.map(f=> f.mime==="application/pdf"
          ? {type:"document", source:{type:"base64", media_type:"application/pdf", data:f.data}}
          : {type:"image", source:{type:"base64", media_type:f.mime, data:f.data}});
        blocks.push({type:"text", text:m.text});
        return {role:"user", content:blocks};
      }
      return {role:"user", content:m.text + m.fileNote};
    });
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body: JSON.stringify({model, max_tokens:maxTokens, system:systemText, messages}),
    });
    const data = await res.json();
    if(!res.ok) throw new Error(data?.error?.message || `Anthropic error ${res.status}`);
    const text = (data.content||[]).map(b=>b.type==="text"?b.text:"").join("").trim();
    if(!text) throw new Error("Claude returned an empty response.");
    return text;
  }

  // OpenAI-compatible: openai + xai
  const base = provider==="openai" ? "https://api.openai.com/v1/chat/completions" : "https://api.x.ai/v1/chat/completions";
  const messages = [{role:"system", content:systemText}, ...norm.map(m=>{
    if(m.role==="assistant") return {role:"assistant", content:m.text};
    const imgs = m.files.filter(f=>f.mime!=="application/pdf");
    if(imgs.length){
      return {role:"user", content:[
        ...imgs.map(f=>({type:"image_url", image_url:{url:`data:${f.mime};base64,${f.data}`}})),
        {type:"text", text:m.text},
      ]};
    }
    return {role:"user", content:m.text + m.fileNote};
  })];
  const res = await fetch(base, {
    method:"POST",
    headers:{"Content-Type":"application/json","Authorization":`Bearer ${key}`},
    body: JSON.stringify({model, max_tokens:maxTokens, messages}),
  });
  const data = await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data?.error?.message || `${PROVIDERS[provider].label} error ${res.status}`);
  const text = data?.choices?.[0]?.message?.content?.trim();
  if(!text) throw new Error("The model returned an empty response.");
  return text;
}

${dates?`TEACHER'S KEY DATES: ${dates}`:""}

${Object.keys(S.selfAssess).length?`TEACHER'S SELF-ASSESSMENT (their own honest rating per dimension): ${DIMS.filter(d=>S.selfAssess[d.dim]!==undefined&&S.selfAssess[d.dim]!==null&&S.selfAssess[d.dim]!=="").map(d=>`${d.dim} ${LEVELS[S.selfAssess[d.dim]]}`).join("; ")}`:""}
${S.observations.length?`OBSERVATION LOG:\n${S.observations.map(o=>`${o.date||"undated"} (${o.type})${o.reinforcement?` — reinforcement: ${o.reinforcement}`:""}${o.refinement?` — refinement: ${o.refinement}`:""}${o.notes?` — notes: ${o.notes}`:""}`).join("\n")}`:""}
${S.inbox.length?`TEACHER'S QUICK-CAPTURE INBOX (evidence jotted in the moment, not yet filed — when asked to help file these, name the best-fit dimension code and criterion for each and whether it should become an ongoing dated series):\n${S.inbox.map(x=>`- (${x.t}) ${x.text}`).join("\n")}`:""}

STYLE RULES: Plain conversational prose, short paragraphs. No markdown headers or asterisks — this renders as plain text. Always cite dimension codes like 2.3 when referencing the rubric. Quote exact qualifier words when explaining level differences. Be specific, practical, and encouraging without flattery. Where district-level policy varies (observation windows, walkthrough counts), note that local district policy controls. If an uploaded image shows student or appraiser names, gently remind about redaction. Keep responses focused — under ~450 words unless building a package or plan.`;

let jspdfPromise = null;
function loadJsPDF(){
  if(window.jspdf?.jsPDF) return Promise.resolve(window.jspdf.jsPDF);
  if(!jspdfPromise){
    jspdfPromise = new Promise((resolve,reject)=>{
      const s = document.createElement("script");
      s.src = "https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js";
      s.onload = ()=> window.jspdf?.jsPDF ? resolve(window.jspdf.jsPDF) : reject(new Error("jsPDF missing"));
      s.onerror = ()=> reject(new Error("jsPDF load failed"));
      document.head.appendChild(s);
    });
  }
  return jspdfPromise;
}

function importBackup(file){

    try{

      if(!parsed || typeof parsed!=="object" || !("evidence" in parsed)) throw new Error("not a companion backup");
      if(!confirm("Load this file? It will replace whatever is currently saved in this browser with the file's contents.")) return;
      S = {...S, ...parsed, profile:{...S.profile, ...(parsed.profile||{})}, ai:{...S.ai, ...(parsed.ai||{})}, meta:{...S.meta, ...(parsed.meta||{})}};
      S.inbox = S.inbox||[]; S.observations = S.observations||[]; S.selfAssess = S.selfAssess||{};

  r.readAsText(file);
}

        <button class="pill" data-action="cycle" data-id="${c.id}" title="Click to advance status" style="background:${st.color}${(e.s||0)===0?"":"26"};color:${(e.s||0)===0?"#5A6662":st.text};box-shadow:inset 0 0 0 1.5px ${st.color}">${st.label}</button>
        <button class="crittext" data-action="open" data-id="${c.id}">${esc(c.c)}
          <span class="mono" style="margin-left:8px;font-size:10px;letter-spacing:.06em;color:${c.p==="Ongoing"?"#8E4A7E":"var(--muted)"}">${esc(c.p.toUpperCase())}</span>
          ${e.d?`<span style="display:block;font-size:12px;color:var(--green);margin-top:3px">✓ ${esc(e.d)}${e.w?` — ${esc(e.w)}`:""}</span>`:""}
        </button>
        <span style="color:#B4BEBA;font-size:12px;flex-shrink:0;padding-top:3px">${open?"▲":"▼"}</span>
      </div>`;
      if(open){
        const ideas = c.i.map((idea,ii)=>{
          const added = hasIdea(e, idea);
          return `<div style="display:flex;gap:8px;align-items:flex-start;padding:3px 0">
            <button class="usebtn${added?" added":""}" data-action="toggleidea" data-id="${c.id}" data-ii="${ii}" title="${added?"Remove from":"Add to"} my evidence description">${added?"✓ added":"+ use"}</button>
            <span>${esc(idea)}</span>
          </div>`;
        }).join("");
        const ai = S.aiIdeas[c.id];
        const aiBlock = ai
          ? `<div style="font-weight:700;color:#8E4A7E;margin-bottom:4px">Ideas for your classroom${S.profile.subject?` (${esc(S.profile.subject)})`:""}:</div><div style="white-space:pre-wrap">${esc(ai)}</div>
             <button class="mono" data-action="genideas" data-id="${c.id}" ${ideaBusy?"disabled":""} style="margin-top:6px;font-size:10px;border:1px solid var(--gray);background:#fff;border-radius:10px;padding:3px 9px;color:var(--muted)">${ideaBusy===c.id?"thinking…":"↻ regenerate"}</button>`
          : `<button data-action="genideas" data-id="${c.id}" ${ideaBusy?"disabled":""} style="font-size:12px;font-weight:600;border:1px solid #8E4A7E;background:#fff;border-radius:14px;padding:5px 12px;color:#8E4A7E">${ideaBusy===c.id?"Thinking…":"✨ Ideas for my classroom"}</button>
             ${!hasKey()?`<span style="margin-left:8px;font-size:11px;color:var(--faint)">Needs an AI key — set one on the Settings tab.</span>`:(!S.profile.subject?`<span style="margin-left:8px;font-size:11px;color:var(--faint)">Tip: set your subject in Settings for tailored ideas.</span>`:"")}`;
        inner += `<div style="padding:0 14px 14px;font-size:13px">
          <div class="ideabox">
            <div style="font-weight:700;color:var(--ink);margin-bottom:6px">Evidence you could use — tap to add, tap again to remove:</div>
            ${ideas}
            <div style="margin-top:8px;padding-top:8px;border-top:1px dashed var(--border)">${aiBlock}</div>
          </div>
          <div class="fieldgrid">
            <input data-bind="d" data-id="${c.id}" value="${esc(e.d||"")}" placeholder="What evidence do you have?">
            <input data-bind="w" data-id="${c.id}" value="${esc(e.w||"")}" placeholder="Where is it stored? (drive folder, binder…)">
            <input data-bind="dt" data-id="${c.id}" value="${esc(e.dt||"")}" placeholder="Date collected">
            <input data-bind="n" data-id="${c.id}" value="${esc(e.n||"")}" placeholder="Notes">
          </div>
        </div>`;
      }
      return inner;
    }).join("");
    return `<section style="margin-bottom:18px">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
        <span class="dimtag" style="background:${DOMAINS[g.dom].color}">${esc(dim)}</span>
        <h2 class="disp" style="font-size:17px;font-weight:600;margin:0">${esc(g.name)}</h2>
      </div>
      <div class="card" style="overflow:hidden">${rows}</div>
    </section>`;
  }).join("");

  return h;
}

/* ---------------- render: coach ---------------- */
function renderCoach(){
  const chips = MODES.map(m=>`<button class="modechip${mode===m.id?" on":""}" data-action="mode" data-m="${m.id}">${m.label}</button>`).join("");
  let intro;
  const gaps = gapDims();
  if(!hasKey()){
    const pv = PROVIDERS[S.ai.provider];
    intro = `<div style="max-width:620px;margin:30px auto;text-align:center;color:#5A6662">
      <div class="disp" style="font-size:20px;font-weight:600;color:var(--ink);margin-bottom:8px">One quick setup step</div>
      <p style="font-size:14px;line-height:1.6">The coach runs on an AI of your choice using your own free/personal API key — nothing is shared with anyone else, and the key lives only in this browser. The tracker, evidence library, and exports all work without one.</p>
      <p style="font-size:13px;line-height:1.6"><b>Fastest route:</b> Google Gemini — get a free key at <b>aistudio.google.com/apikey</b> (sign in with any Google account, click "Create API key," copy it). Then paste it on the <b>Settings tab</b>. ChatGPT, Claude, and Grok keys work too.</p>
      <button class="btn dark" data-action="gosettings">Open Settings</button>
    </div>`;

      <div class="disp" style="font-size:20px;font-weight:600;color:var(--ink);margin-bottom:8px">${m.label}</div>

    </div>`;

    intro = `<div style="max-width:620px;margin:30px auto;text-align:center;color:#5A6662">

      <p style="font-size:14px;line-height:1.6">I know the full rubric, all ${CRITERIA.length} Distinguished criteria, the guidebook process rules, your key dates, and your live evidence log${gaps.length?` — including the ${gaps.length} dimension${gaps.length>1?"s":""} you haven't touched yet.`:"."}</p>
    </div>`;
  }
  const msgs = chat.map((m,i)=>`
    <div style="display:flex;justify-content:${m.role==="user"?"flex-end":"flex-start"};margin-bottom:12px">
      <div class="msg ${m.role==="user"?"user":"bot"}">
        ${m.files&&m.files.length?`<div class="mono" style="font-size:11px;opacity:.75;margin-bottom:5px">📎 ${esc(m.files.map(f=>f.name).join(", "))}</div>`:""}${esc(m.text)}
        ${m.role==="assistant"?`<div style="margin-top:8px"><button class="mono" data-action="savenote" data-i="${i}" style="font-size:11px;border:1px solid var(--gray);background:#fff;border-radius:12px;padding:3px 10px;color:var(--sub)">Save to my notes</button></div>`:""}
      </div>
    </div>`).join("");
  const att = attachments.map((a,i)=>`<span class="mono" style="font-size:11px;background:#EDF0EF;border-radius:12px;padding:4px 10px;display:inline-flex;align-items:center;gap:6px">📎 ${esc(a.name)} <button data-action="rmatt" data-i="${i}" style="border:none;background:transparent;font-size:12px;padding:0">✕</button></span>`).join(" ");
  const ph = mode ? MODES.find(m=>m.id===mode).placeholder : "Ask anything about T-TESS, your evidence, or your scores…";
  const accept = PROVIDERS[S.ai.provider].pdf ? "image/*,application/pdf" : "image/*";
  return `<div style="display:flex;flex-direction:column;min-height:70vh">
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${chips}</div>
    <div class="card" style="flex:1;border-radius:10px;display:flex;flex-direction:column;overflow:hidden">
      <div id="chatscroll" style="flex:1;overflow-y:auto;padding:18px">
        ${chat.length===0?intro:msgs}
        ${chat.length>0&&thinking?`<div style="color:var(--faint);font-size:13px;font-style:italic">Coach is reading the rubric…</div>`:""}
      </div>
      <div style="border-top:1px solid var(--line);padding:12px">
        ${attachments.length?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">${att}</div>`:""}
        <div style="display:flex;gap:8px;align-items:flex-end">
          <button data-action="attach" title="Attach screenshot or image" style="border:1px solid var(--gray);background:#fff;border-radius:8px;padding:9px 12px;font-size:16px;flex-shrink:0" ${!hasKey()?"disabled":""}>📎</button>
          <input id="filepick" type="file" accept="${accept}" multiple style="display:none">
          <textarea id="chatinput" rows="2" placeholder="${esc(ph)}" style="flex:1;resize:none;line-height:1.4" ${!hasKey()?"disabled":""}></textarea>
          <button class="btn dark" data-action="send" style="padding:10px 18px;font-size:14px;flex-shrink:0" ${thinking||!hasKey()?"disabled":""}>Send</button>
        </div>
        <div class="note" style="margin-top:6px">Keep uploads redacted (no student or appraiser names). Chats clear when you leave the page — tap "Save to my notes" under any response you want to keep. Coach: ${esc(PROVIDERS[S.ai.provider].label)}${hasKey()?` · ${esc(modelName())}`:" — no key set"} · <a href="#" data-action="feedback" style="color:var(--d1)">send feedback</a></div>
      </div>
    </div>
  </div>`;
}

      <h2 class="disp" style="font-size:18px;font-weight:600;margin:0 0 4px">Save your work / use another computer</h2>
      <p style="font-size:13px;color:var(--sub);margin:0 0 8px;line-height:1.6">Everything you enter here (statuses, evidence notes, goals, dates, saved coach notes) is stored <b>in this browser on this computer</b> — like a binder that stays in one classroom. To carry your binder with you, save it to a file:</p>
      <ol style="font-size:13px;color:var(--sub);margin:0 0 12px;padding-left:20px;line-height:1.7">
        <li><b>Save my data</b> downloads one small file (it ends in .json — you don't need to open or understand it, just keep it). Save it somewhere you can reach from anywhere, like your Google Drive or a flash drive.</li>
        <li>On the other computer, open this same website, come to this tab, and click <b>Load my data</b> — pick that file, and everything appears exactly as you left it.</li>
      </ol>
      <p style="font-size:12px;color:var(--muted);margin:0 0 12px">Good habit: click Save my data after a big logging session, and always before clearing your browser history (clearing history erases the binder).</p>
      <button class="btn dark" data-action="backup">⬇ Save my data</button>
      <button class="btn" data-action="restore">⬆ Load my data</button>
      <input id="restorepick" type="file" accept="application/json,.json" style="display:none">
    </section>

    <p class="note">Privacy: everything saves to this browser's local storage on this device — nothing is sent anywhere except your coach messages, which go directly from your browser to the AI provider you chose, using your key. Uploaded images and PDFs are analyzed in the moment but never stored; keep artifact files in your own drive and log their location in the "Where is it stored?" field.</p>
  </div>`;
}

      <li><b>One click before your EOY conference</b> — a formatted PDF of everything you logged.</li>
    </ol>
    <div class="fieldgrid" style="margin-bottom:12px">
      <div><label class="lab">YOUR NAME</label><input id="wname" placeholder="e.g., Ms. Rivera" style="width:100%;margin-top:4px"></div>
      <div><label class="lab">WHAT YOU TEACH</label><input id="wsubject" placeholder="e.g., 7th grade math" style="width:100%;margin-top:4px"></div>
    </div>
    <p style="font-size:11px;color:var(--faint);margin:0 0 12px">Everything you enter stays in this browser on this device — nothing is uploaded anywhere.</p>
    <button class="btn dark" data-action="welcomego" style="padding:10px 18px;font-size:14px">Let's go</button>
    <button data-action="welcomego" style="border:none;background:transparent;color:var(--muted);font-size:13px;margin-left:8px;text-decoration:underline">Skip for now</button>
  </div></div>`;
}
function render(){
  $("#namechip").textContent = S.profile.name || "My workspace";
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on", b.dataset.tab===tab));
  const main = $("#main");
  main.innerHTML = (tab==="dashboard" ? renderDashboard() : tab==="coach" ? renderCoach() : renderSettings()) + (!S.meta.welcomed ? renderWelcome() : "");
  if(tab==="coach"){
    const sc = $("#chatscroll"); if(sc) sc.scrollTop = sc.scrollHeight;
    const ci = $("#chatinput");
    if(ci){
      ci.value = draftInput;
      ci.addEventListener("input", ()=>{ draftInput = ci.value; });
      ci.addEventListener("keydown", (e)=>{ if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); doSend(); } });
    }
    const fp = $("#filepick");
    if(fp) fp.addEventListener("change", async (e)=>{ await addFiles(e.target.files); e.target.value=""; render(); });
  }
  if(tab==="dashboard"){
    const sb = $("#searchbox");
    if(sb){
      sb.addEventListener("input", ()=>{ search = sb.value; refreshListOnly(); });
    }
  }
  if(tab==="settings"){
    $("#provider").addEventListener("change", (e)=>{ S.ai.provider = e.target.value; save(); render(); });
    $("#apikey").addEventListener("input", (e)=>{ S.ai.key = e.target.value; save(); });
    $("#apimodel").addEventListener("input", (e)=>{ S.ai.model = e.target.value; save(); });
    document.querySelectorAll("[data-prof]").forEach(inp=>{
      inp.addEventListener("input", ()=>{ S.profile[inp.dataset.prof] = inp.value; save(); $("#namechip").textContent = S.profile.name || "My workspace"; });
    });
    const rp = $("#restorepick");
    rp.addEventListener("change", (e)=>{ if(e.target.files[0]) importBackup(e.target.files[0]); e.target.value=""; });
  }
}
/* re-render dashboard without stealing focus from the search box */
function refreshListOnly(){
  if(tab!=="dashboard") return;
  const sb = $("#searchbox");
  const pos = sb ? sb.selectionStart : 0;
  const main = $("#main");
  main.innerHTML = renderDashboard();
  const nb = $("#searchbox");
  if(nb){
    nb.addEventListener("input", ()=>{ search = nb.value; refreshListOnly(); });
    nb.focus(); nb.setSelectionRange(pos,pos);
  }
}

let draftInput = "";

/* ---------------- chat actions ---------------- */
function fileToAttachment(file){
  return new Promise((resolve,reject)=>{
    const r = new FileReader();
    r.onload = ()=> resolve({name:file.name, mime:file.type||"image/png", data:r.result.split(",")[1]});
    r.onerror = ()=> reject(new Error("read failed"));
    r.readAsDataURL(file);
  });
}
async function addFiles(fileList){
  const files = Array.from(fileList||[]).slice(0,4);
  for(const f of files){
    if(f.size > 8*1024*1024) continue;
    if(f.type==="application/pdf" && !PROVIDERS[S.ai.provider].pdf) { alert(`${PROVIDERS[S.ai.provider].label} can't read PDFs in the browser — attach a screenshot instead.`); continue; }
    try{ attachments.push(await fileToAttachment(f)); }catch(e){}
  }
  attachments = attachments.slice(0,4);
}
async function doSend(){
  const text = draftInput.trim();
  if((!text && !attachments.length) || thinking || !hasKey()) return;
  chat.push({role:"user", text: text || "(attachment)", files: attachments});
  attachments = []; draftInput = ""; thinking = true; track("coach-send"); render();
  try{
    const history = chat.slice(-10);
    const reply = await callAI(buildSystem(), history, 1024);
    chat.push({role:"assistant", text: reply});
  }catch(e){
    chat.push({role:"assistant", text: "I couldn't reach the coach: " + (e.message||"unknown error") + "\n\nCheck your key, model name, and connection on the Settings tab, then try again."});
  }
  thinking = false; render();
}
async function doGenIdeas(critId){
  if(ideaBusy || !hasKey()) { if(!hasKey()){ tab="settings"; render(); } return; }
  const crit = critById(critId);
  ideaBusy = critId; render();
  try{
    const sys = "You suggest concrete T-TESS evidence artifacts for Texas teachers. Respond with exactly 4 numbered one-line artifact ideas, each naming a specific tangible artifact (photo, log, sample, export, document). No preamble, no markdown symbols other than the numbers.";
    const user = `Criterion (dimension ${crit.dim} ${crit.dn}, Distinguished level): "${crit.c}"\nEvidence pattern: ${crit.p}.\nMy teaching context: ${S.profile.subject || "not specified"}.\nGeneric ideas I already have: ${crit.i.join(" | ")}\nGive 4 NEW ideas tailored to my specific classroom context — different from the generic ones.`;
    const text = await callAI(sys, [{role:"user", text:user, files:[]}], 600);
    S.aiIdeas[critId] = text; save();
  }catch(e){ alert("Couldn't generate ideas: " + (e.message||"unknown error")); }
  ideaBusy = null; render();
}
async function testAI(){
  const btn = $("#testbtn"), out = $("#testresult");
  btn.disabled = true; out.textContent = "Testing…"; out.style.color = "var(--muted)";
  try{
    const reply = await callAI("Reply with exactly: OK", [{role:"user", text:"Connection test. Reply with exactly: OK", files:[]}], 20);
    out.textContent = "✓ Connected — " + reply.slice(0,40); out.style.color = "var(--green)";
  }catch(e){
    out.textContent = "✕ " + (e.message||"failed"); out.style.color = "var(--red)";
  }
  btn.disabled = false;
}

/* ---------------- event delegation ---------------- */
document.addEventListener("click", (ev)=>{
  const t = ev.target.closest("[data-action],[data-tab]");
  if(!t) return;
  if(t.dataset.tab){ tab = t.dataset.tab; render(); return; }
  const a = t.dataset.action;
  if(a==="domfilter"){ const d=+t.dataset.d; domainFilter = domainFilter===d?0:d; render(); }
  else if(a==="statusfilter"){ const s=+t.dataset.s; statusFilter = statusFilter===s?null:s; render(); }
  else if(a==="patternfilter"){ const p=t.dataset.p; patternFilter = patternFilter===p?null:p; render(); }
  else if(a==="cycle"){
    const id = t.dataset.id;
    const e = S.evidence[id] || {s:0,d:"",w:"",dt:"",n:""};
    const wasInProgress = e.s===1;
    S.evidence[id] = {...e, s:((e.s||0)+1)%4, dt: wasInProgress && !e.dt ? fmtDate() : e.dt};
    bumpUnsaved(); trackEvidenceOnce();
    save(); render();
  }
  else if(a==="open"){ const id=t.dataset.id; openCrit = openCrit===id?null:id; render(); }
  else if(a==="toggleidea"){
    const id = t.dataset.id, ii = +t.dataset.ii;
    const crit = critById(id), idea = crit.i[ii];
    const e = S.evidence[id] || {s:0,d:"",w:"",dt:"",n:""};
    const items = ideaItems(e);
    const next = items.includes(idea) ? items.filter(x=>x!==idea) : [...items, idea];
    S.evidence[id] = {...e, d: next.join("; "), s: (e.s||0)>0 ? e.s : (next.length?1:0)};
    bumpUnsaved(); trackEvidenceOnce();
    save(); render();
  }
  else if(a==="genideas"){ doGenIdeas(t.dataset.id); }
  else if(a==="csv"){ exportCSV(); }
  else if(a==="pdf"){ exportPDF(); }
  else if(a==="mode"){ mode = t.dataset.m; chat = []; render(); }
  else if(a==="send"){ doSend(); }
  else if(a==="attach"){ const fp=$("#filepick"); if(fp) fp.click(); }
  else if(a==="rmatt"){ attachments.splice(+t.dataset.i,1); render(); }
  else if(a==="savenote"){
    const m = chat[+t.dataset.i];
    if(m){ S.analyses.unshift({date:fmtDate(), mode: mode?MODES.find(x=>x.id===mode).label:"Coach", text:m.text}); S.analyses = S.analyses.slice(0,40); save(); t.textContent="✓ saved"; }
  }
  else if(a==="delnote"){ ev.preventDefault(); S.analyses.splice(+t.dataset.i,1); save(); render(); }
  else if(a==="gosettings"){ tab="settings"; render(); }
  else if(a==="feedback"){ ev.preventDefault(); location.href = feedbackHref(); }
  else if(a==="dismissnudge"){ S.meta.unsaved = 0; save(); render(); }
  else if(a==="addinbox"){
    const inp = $("#inboxinput");
    if(inp && inp.value.trim()){ S.inbox.push({t:fmtDate(), text:inp.value.trim()}); save(); trackEvidenceOnce(); render(); }
  }
  else if(a==="delinbox"){ S.inbox.splice(+t.dataset.i,1); save(); render(); }
  else if(a==="fileinbox"){
    tab="coach"; mode=null; chat=[];
    draftInput = "Help me file my quick-capture inbox. For each item, tell me which dimension and criterion it best supports, what to name it in my log, and whether it should become an ongoing dated series.";
    render();
  }
  else if(a==="addobs"){
    const o = {date:$("#obsdate")?.value||"", type:$("#obstype")?.value||"Walkthrough", reinforcement:$("#obsref")?.value.trim()||"", refinement:$("#obsrefine")?.value.trim()||"", notes:$("#obsnotes")?.value.trim()||""};
    if(o.date || o.reinforcement || o.refinement || o.notes){
      S.observations.unshift(o);
      if(o.reinforcement && !S.profile.reinforcement) S.profile.reinforcement = o.reinforcement;
      if(o.refinement && !S.profile.refinement) S.profile.refinement = o.refinement;
      save(); render();
    }
  }
  else if(a==="delobs"){ S.observations.splice(+t.dataset.i,1); save(); render(); }
  else if(a==="backup"){ exportBackup(); }
  else if(a==="restore"){ $("#restorepick").click(); }
  else if(a==="testai"){ testAI(); }
  else if(a==="welcomego"){
    const n = $("#wname")?.value.trim(), s2 = $("#wsubject")?.value.trim();
    if(n) S.profile.name = n;
    if(s2) S.profile.subject = s2;
    S.meta.welcomed = true;
    track("welcome-done");
    save(); render();
  }
});

/* evidence field edits (delegated, no re-render to keep focus) */
document.addEventListener("input", (ev)=>{
  const t = ev.target;
  if(t.dataset && t.dataset.bind && t.dataset.id){
    const id = t.dataset.id;
    const e = S.evidence[id] || {s:0,d:"",w:"",dt:"",n:""};
    e[t.dataset.bind] = t.value;
    S.evidence[id] = e;
    bumpUnsaved(); trackEvidenceOnce();
    save();
  }
});
document.addEventListener("change", (ev)=>{
  const t = ev.target;
  if(t.dataset && t.dataset.sa !== undefined && t.dataset.sa !== null && t.tagName==="SELECT"){
    const v = t.value;
    if(v==="") delete S.selfAssess[t.dataset.sa];
    else S.selfAssess[t.dataset.sa] = +v;
    save();
  }
});

render();

</script>
<script data-goatcounter="https://beeindew.goatcounter.com/count" async src="https://gc.zgo.at/count.js"></script>
</body>
